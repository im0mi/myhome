<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>气球大作战：狂热版</title>
    <style>
        :root { --primary: #3498db; --danger: #ff4757; --gold: #f1c40f; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; background: #2c3e50; color: white; user-select: none; }
        #ui-layer { position: absolute; top: 20px; left: 0; width: 100%; pointer-events: none; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        canvas { display: block; background: radial-gradient(circle, #34495e, #2c3e50); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .menu-card { background: white; color: #333; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; transition: 0.2s; margin-top: 20px; }
        button:hover { transform: scale(1.1); background: #2980b9; }
        .hidden { display: none !important; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } 75% { transform: translate(5px,-5px); } }
    </style>
</head>
<body id="body">
    <div id="ui-layer">
        <div>得分: <span id="score">0</span></div>
        <div>时间: <span id="timer">30</span>s</div>
        <div>最高分: <span id="highScore">0</span></div>
    </div>

    <div id="overlay">
        <div class="menu-card">
            <h1 id="msg-title">气球大作战</h1>
            <p id="msg-desc">点击气球得分，避开黑色炸弹！</p>
            <button id="startBtn">开始挑战</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        
        // 游戏状态
        let score = 0, timeLeft = 30, gameActive = false;
        let targets = [], particles = [];
        let highScore = localStorage.getItem('balloonMax') || 0;
        let lastTime = 0, shakeTime = 0;

        // 音效生成器 (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Target {
            constructor() {
                this.radius = 25 + Math.random() * 15;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = Math.random() * (canvas.height - this.radius * 2) + this.radius;
                this.life = 1.0; // 存活时间进度
                this.decay = 0.01 + (score * 0.0005); // 随分数增加消失速度
                
                // 随机类型：80%普通, 10%金球, 10%炸弹
                let r = Math.random();
                if (r < 0.1) { this.type = 'gold'; this.color = '#f1c40f'; }
                else if (r < 0.2) { this.type = 'bomb'; this.color = '#2d3436'; }
                else { this.type = 'normal'; this.color = '#ff4757'; }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15 * this.life;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        function spawn() {
            if (targets.length < 5) targets.push(new Target());
        }

        function update(time) {
            if (!gameActive) return;
            const dt = time - lastTime;
            lastTime = time;

            // 处理震动效果
            if (shakeTime > 0) {
                document.getElementById('body').classList.add('shake');
                shakeTime -= dt;
            } else {
                document.getElementById('body').classList.remove('shake');
            }

            // 更新目标状态
            for (let i = targets.length - 1; i >= 0; i--) {
                targets[i].life -= targets[i].decay;
                if (targets[i].life <= 0) targets.splice(i, 1);
            }

            if (Math.random() < 0.05) spawn();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            targets.forEach(t => t.draw());
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.sqrt((mx - t.x)**2 + (my - t.y)**2);
                
                if (dist < t.radius * t.life) {
                    if (t.type === 'bomb') {
                        score = Math.max(0, score - 5);
                        shakeTime = 300;
                        playSound(100, 'sawtooth', 0.4);
                    } else {
                        score += (t.type === 'gold' ? 5 : 1);
                        playSound(t.type === 'gold' ? 800 : 400, 'sine', 0.1);
                    }
                    document.getElementById('score').innerText = score;
                    targets.splice(i, 1);
                    break;
                }
            }
        });

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            score = 0; timeLeft = 30; targets = []; gameActive = true;
            document.getElementById('score').innerText = score;
            document.getElementById('highScore').innerText = highScore;
            overlay.classList.add('hidden');
            
            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInt);
                    endGame();
                }
            }, 1000);

            lastTime = performance.now();
            update(lastTime);
        }

        function endGame() {
            gameActive = false;
            overlay.classList.remove('hidden');
            document.getElementById('msg-title').innerText = "时间到！";
            document.getElementById('msg-desc').innerText = "最终得分：" + score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('balloonMax', highScore);
                document.getElementById('msg-title').innerText = "新纪录！";
            }
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
