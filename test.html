<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>CORE CRUSHER: NEON OVERDRIVE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffcf00;
        }
        body {
            margin: 0; overflow: hidden; background: #020205;
            font-family: 'Orbitron', sans-serif; color: white; user-select: none;
        }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }

        /* 扫描线效果 */
        body::after {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-box {
            border-left: 4px solid var(--neon-blue);
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.1), transparent);
            padding: 10px 20px; text-shadow: 0 0 10px var(--neon-blue);
        }

        #combo-container {
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
            text-align: right;
        }
        #combo-val { font-size: 80px; font-weight: 900; color: var(--neon-pink); line-height: 0.8; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .menu-card {
            text-align: center; border: 1px solid var(--neon-blue);
            padding: 60px; background: rgba(0,0,0,0.5);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .btn-glitch {
            background: var(--neon-blue); color: black; border: none;
            padding: 15px 50px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.2s;
        }
        .btn-glitch:hover {
            background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div style="display: flex; justify-content: space-between;">
            <div class="hud-box">
                <div style="font-size: 12px;">SYSTEM_SCORE</div>
                <div id="score" style="font-size: 32px;">0000</div>
            </div>
            <div class="hud-box" style="border-left-color: var(--neon-pink);">
                <div style="font-size: 12px;">TIME_REMAINING</div>
                <div id="timer" style="font-size: 32px;">30.0s</div>
            </div>
        </div>
        <div id="combo-container" style="opacity: 0;">
            <div style="font-size: 14px;">MULTIPLIER</div>
            <div id="combo-val">X12</div>
        </div>
    </div>

    <div id="overlay">
        <div class="menu-card">
            <h1 style="font-size: 48px; margin: 0; color: var(--neon-blue);">CORE CRUSHER</h1>
            <p style="letter-spacing: 4px; opacity: 0.6; margin-bottom: 40px;">NEON OVERDRIVE v5.0</p>
            <button class="btn-glitch" onclick="startGame()">INITIALIZE</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let score = 0, combo = 0, timeLeft = 30, gameActive = false;
    let targets = [], particles = [], floatingTexts = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 1. 动态背景：星海
    const stars = Array(100).fill().map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.1
    }));

    class FloatingText {
        constructor(x, y, text, color) {
            this.x = x; this.y = y; this.text = text; this.color = color;
            this.opacity = 1;
            gsap.to(this, { y: y - 50, opacity: 0, duration: 1, onComplete: () => {
                floatingTexts = floatingTexts.filter(t => t !== this);
            }});
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.font = "bold 20px Orbitron";
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    class CoreTarget {
        constructor() {
            this.radius = 35 + Math.random() * 15;
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = Math.random() * (canvas.height - 100) + 50;
            this.type = Math.random() < 0.15 ? 'BOMB' : (Math.random() < 0.1 ? 'GOLD' : 'CORE');
            this.color = this.type === 'BOMB' ? '#ff0055' : (this.type === 'GOLD' ? '#ffcf00' : '#00f3ff');
            this.rotation = 0;
            this.scale = 0;
            this.life = 1.0;
            gsap.to(this, { scale: 1, duration: 0.4, ease: "back.out(2)" });
        }

        draw(time) {
            this.rotation += 0.02;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scale, this.scale);

            // 绘制外环
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 10]);
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, this.rotation, this.rotation + Math.PI * 2);
            ctx.stroke();

            // 绘制内核
            const pulse = Math.sin(time / 200) * 5;
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius/2 + pulse);
            grad.addColorStop(0, this.color);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius/2 + pulse, 0, Math.PI * 2);
            ctx.fill();

            // 辅助装饰
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(-this.radius-5, 0); ctx.lineTo(-this.radius+5, 0);
            ctx.moveTo(this.radius-5, 0); ctx.lineTo(this.radius+5, 0);
            ctx.stroke();

            ctx.restore();
        }
    }

    function spawnTarget() {
        if(targets.length < 6) targets.push(new CoreTarget());
    }

    function update(time) {
        if(!gameActive) return;
        ctx.fillStyle = '#020205';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 背景星空
        ctx.fillStyle = "white";
        stars.forEach(s => {
            s.y += s.speed;
            if(s.y > canvas.height) s.y = 0;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });

        if(Math.random() < 0.04) spawnTarget();

        targets.forEach(t => t.draw(time));
        floatingTexts.forEach(ft => ft.draw());

        requestAnimationFrame(update);
    }

    canvas.addEventListener('mousedown', (e) => {
        if(!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;

        let hit = false;
        for(let i=targets.length-1; i>=0; i--) {
            const t = targets[i];
            const dist = Math.hypot(mx - t.x, my - t.y);
            if(dist < t.radius) {
                hit = true;
                processHit(t);
                targets.splice(i, 1);
                break;
            }
        }

        if(!hit) {
            combo = 0;
            gsap.to("#combo-container", { opacity: 0 });
        }
    });

    function processHit(t) {
        if(t.type === 'BOMB') {
            score = Math.max(0, score - 50);
            combo = 0;
            floatingTexts.push(new FloatingText(t.x, t.y, "-50 CRITICAL ERROR", "#ff0055"));
            gsap.to("#combo-container", { opacity: 0 });
            gsap.fromTo("body", { filter: "invert(1)" }, { filter: "invert(0)", duration: 0.2 });
        } else {
            combo++;
            const basePoints = t.type === 'GOLD' ? 50 : 10;
            const finalPoints = basePoints * (1 + Math.floor(combo/5));
            score += finalPoints;
            
            floatingTexts.push(new FloatingText(t.x, t.y, `+${finalPoints}`, t.color));
            
            if(combo > 1) {
                document.getElementById('combo-val').innerText = `X${combo}`;
                gsap.to("#combo-container", { opacity: 1, scale: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
            }
        }
        document.getElementById('score').innerText = score.toString().padStart(4, '0');
    }

    function startGame() {
        score = 0; timeLeft = 30; combo = 0; targets = []; gameActive = true;
        document.getElementById('overlay').style.display = 'none';
        
        // UI 入场动画
        gsap.from(".hud-box", { x: -100, opacity: 0, stagger: 0.2, duration: 0.8 });

        const timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer').innerText = timeLeft.toFixed(1) + 's';
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 100);

        update(0);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('overlay').style.display = 'flex';
        document.querySelector('h1').innerText = "MISSION COMPLETE";
        document.querySelector('p').innerText = `TOTAL SCORE: ${score} | MAX COMBO: ${combo}`;
    }
</script>
</body>
</html>
